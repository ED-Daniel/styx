# Subscription endpoints for Styx VPN
# Add these location blocks to your nginx server config (port 8443 with SSL)
#
# Prerequisites:
#   mkdir -p /var/www/styx-sub
#   Run: scripts/generate-subscriptions.sh

# Happ client subscription (with routing deeplink)
location /sub {
    alias /var/www/styx-sub/sub;
    default_type 'text/plain; charset=utf-8';
}

# v2RayTun client subscription (with routing header)
location /v2sub {
    alias /var/www/styx-sub/v2sub;
    default_type 'text/plain; charset=utf-8';
    add_header routing '${V2SUB_ROUTING_B64}';
    add_header profile-title 'base64:U3R5eCBWUE4=';
    add_header profile-update-interval '12';
    add_header update-always 'true';
}
