global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "blackbox-tcp-xray"
    metrics_path: /probe
    params:
      module: [tcp_xray]
    static_configs:
      - targets:
          - xray:443
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "blackbox-http-via-proxy"
    metrics_path: /probe
    params:
      module: [http_via_proxy]
    static_configs:
      - targets:
          - http://cp.cloudflare.com
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: "xray-metrics"
    metrics_path: /metrics
    static_configs:
      - targets: ["xray-exporter:9550"]
