modules:
  tcp_xray:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: ip4

  http_via_proxy:
    prober: http
    timeout: 10s
    http:
      preferred_ip_protocol: ip4
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 204]
      method: GET
      proxy_url: "socks5://xray:10808"
